name: Release Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true

jobs:
  # ── Stage 1: Pre-release Check ──────────────────────────────
  pre-release-check:
    name: Pre-release Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest ruff pytest-cov

      - name: Run full test suite
        run: |
          echo "Running full test suite..."
          pytest harness/tests/ -v --tb=short || {
            echo "FAIL: Tests failed"
            exit 1
          }

      - name: Run lint check
        run: |
          echo "Running lint check..."
          ruff check harness/ hooks/ || {
            echo "FAIL: Lint failed"
            exit 1
          }

      - name: Check version consistency
        run: |
          echo "Checking version consistency..."
          VERSION=${{ github.event.release.tag_name || github.event.inputs.version }}
          echo "Release version: $VERSION"

  # ── Stage 2: Version Consistency ────────────────────────────
  version-check:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    needs: [pre-release-check]
    steps:
      - uses: actions/checkout@v4

      - name: Read version from release
        run: |
          VERSION=${{ github.event.release.tag_name || github.event.inputs.version }}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Verify package.json version
        run: |
          PKG_VERSION=$(grep '"version"' package.json | cut -d'"' -f4)
          echo "package.json version: $PKG_VERSION"
          echo "Release version: $VERSION"
          # 去掉 v 前缀进行比较
          COMPARE_VERSION=${VERSION#v}
          if [ "$PKG_VERSION" != "$COMPARE_VERSION" ]; then
            echo "WARNING: Version mismatch"
          fi

  # ── Stage 3: Generate ChangeLog ────────────────────────────
  changelog:
    name: Generate ChangeLog
    runs-on: ubuntu-latest
    needs: [version-check]
    steps:
      - uses: actions/checkout@v4

      - name: Generate ChangeLog
        run: |
          echo "# ChangeLog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## ${{ github.event.release.tag_name || github.event.inputs.version }}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "${{ github.event.release.body || 'No release notes' }}" >> CHANGELOG.md

      - name: Display ChangeLog
        run: cat CHANGELOG.md

  # ── Stage 4: Notify ────────────────────────────────────────
  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [changelog]
    if: success()
    steps:
      - name: Success notification
        run: |
          echo "Release ${{ github.event.release.tag_name || github.event.inputs.version }} completed successfully!"

      - name: Send Feishu notification
        if: env.FEISHU_WEBHOOK_URL != ''
        run: |
          curl -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "post",
              "content": {
                "post": {
                  "zh_cn": {
                    "title": "CHK 发布成功",
                    "content": [[
                      {"tag": "text", "text": "版本: ${{ github.event.release.tag_name || github.event.inputs.version }}"},
                      {"tag": "text", "text": "状态: ✅ 发布成功"},
                      {"tag": "a", "text": "查看 Release", "href": "${{ github.event.release.html_url || github.server_url }}/${{ github.repository }}/releases"}
                    ]]
                  }
                }
              }
            }' || echo "Feishu notification skipped (webhook not configured)"

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [pre-release-check]
    if: failure()
    steps:
      - name: Failure notification
        run: |
          echo "Release FAILED!"

      - name: Send Feishu notification
        if: env.FEISHU_WEBHOOK_URL != ''
        run: |
          curl -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "post",
              "content": {
                "post": {
                  "zh_cn": {
                    "title": "CHK 发布失败",
                    "content": [[
                      {"tag": "text", "text": "版本: ${{ github.event.release.tag_name || github.event.inputs.version }}"},
                      {"tag": "text", "text": "状态: ❌ 发布失败"},
                      {"tag": "text", "text": "原因: 测试未通过或版本检查失败"}
                    ]]
                  }
                }
              }
            }' || echo "Feishu notification skipped (webhook not configured)"