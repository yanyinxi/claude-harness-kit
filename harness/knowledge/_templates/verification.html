<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证报告 - {{title}}</title>
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a2332;
            --bg-card: #1e2a3a;
            --border: #2d3f5a;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --accent: #4fc3f7;
            --accent-success: #81c784;
            --accent-warning: #ffb74d;
            --accent-danger: #ef5350;
            --code-bg: #1a1f29;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            padding: 2rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }
        header h1 { color: var(--accent); font-size: 1.8rem; }
        .meta { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .tag {
            background: var(--accent);
            color: var(--bg-primary);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        main { background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
        }
        .status-passed {
            background: rgba(129, 199, 132, 0.2);
            color: var(--accent-success);
            border: 1px solid var(--accent-success);
        }
        .status-failed {
            background: rgba(239, 83, 80, 0.2);
            color: var(--accent-danger);
            border: 1px solid var(--accent-danger);
        }
        .status-warning {
            background: rgba(255, 183, 77, 0.2);
            color: var(--accent-warning);
            border: 1px solid var(--accent-warning);
        }
        .status-pending {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
        }
        .checklist {
            list-style: none;
            padding: 0;
        }
        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }
        .check-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }
        .check-icon.passed {
            background: var(--accent-success);
            color: var(--bg-primary);
        }
        .check-icon.failed {
            background: var(--accent-danger);
            color: white;
        }
        .check-icon.pending {
            background: var(--border);
            color: var(--text-secondary);
        }
        .check-content h4 { color: var(--text-primary); margin-bottom: 0.25rem; }
        .check-content p { color: var(--text-secondary); font-size: 0.9rem; }
        .progress-bar {
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            margin: 1rem 0;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent-success);
            transition: width 0.5s ease;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{title}}</h1>
            <div class="meta">
                <span class="tag">验证报告</span>
                <span class="tag" style="background: var(--bg-secondary); color: var(--text-primary);">状态指示器</span>
            </div>
        </header>
        <main>
            {{content}}
        </main>
        <footer>
            CHK Document | Generated by Claude Code
        </footer>
    </div>
</body>
</html>
