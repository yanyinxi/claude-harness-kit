<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品需求文档 - {{title}}</title>
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a2332;
            --bg-card: #1e2a3a;
            --border: #2d3f5a;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --accent: #4fc3f7;
            --accent-success: #81c784;
            --accent-warning: #ffb74d;
            --accent-danger: #ef5350;
            --code-bg: #1a1f29;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            padding: 2rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }
        header h1 { color: var(--accent); font-size: 1.8rem; }
        .meta { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .tag {
            background: var(--accent);
            color: var(--bg-primary);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        main { background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        .user-story {
            background: var(--bg-secondary);
            border-left: 4px solid var(--accent-success);
            padding: 1rem 1.5rem;
            border-radius: 0 8px 8px 0;
            margin: 1rem 0;
        }
        .user-story .role { color: var(--accent-success); font-weight: 600; }
        .user-story .action { color: var(--text-primary); }
        .user-story .goal { color: var(--accent); font-style: italic; }
        .priority-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .priority-high { background: var(--accent-danger); color: white; }
        .priority-medium { background: var(--accent-warning); color: var(--bg-primary); }
        .priority-low { background: var(--accent-success); color: var(--bg-primary); }
        .acceptance-criteria {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .acceptance-criteria h4 { color: var(--accent); margin-bottom: 0.5rem; }
        .acceptance-criteria ul { padding-left: 1.5rem; }
        .milestone {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }
        .milestone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
        .milestone-title { font-weight: 600; color: var(--accent); }
        .milestone-date { color: var(--text-secondary); font-size: 0.85rem; }
        footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{title}}</h1>
            <div class="meta">
                <span class="tag">产品需求</span>
                <span class="tag" style="background: var(--bg-secondary); color: var(--text-primary);">移动端自适应</span>
            </div>
        </header>
        <main>
            {{content}}
        </main>
        <footer>
            CHK Document | Generated by Claude Code
        </footer>
    </div>
</body>
</html>
