<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审查报告 - {{title}}</title>
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a2332;
            --bg-card: #1e2a3a;
            --border: #2d3f5a;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --accent: #4fc3f7;
            --accent-success: #81c784;
            --accent-warning: #ffb74d;
            --accent-danger: #ef5350;
            --code-bg: #1a1f29;
            --severity-critical: #ef5350;
            --severity-high: #ff7043;
            --severity-medium: #ffb74d;
            --severity-low: #81c784;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            padding: 2rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }
        header h1 { color: var(--accent); font-size: 1.8rem; }
        .meta { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .tag {
            background: var(--accent);
            color: var(--bg-primary);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        main { background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .summary-card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
        .summary-card .count {
            font-size: 2rem;
            font-weight: 700;
        }
        .summary-card .label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        .count-critical { color: var(--severity-critical); }
        .count-high { color: var(--severity-high); }
        .count-medium { color: var(--severity-medium); }
        .count-low { color: var(--severity-low); }
        .issue {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            border-left: 4px solid var(--severity-medium);
        }
        .issue.critical { border-left-color: var(--severity-critical); }
        .issue.high { border-left-color: var(--severity-high); }
        .issue.medium { border-left-color: var(--severity-medium); }
        .issue.low { border-left-color: var(--severity-low); }
        .issue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .issue-title { font-weight: 600; }
        .severity-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .severity-badge.critical { background: var(--severity-critical); color: white; }
        .severity-badge.high { background: var(--severity-high); color: white; }
        .severity-badge.medium { background: var(--severity-medium); color: var(--bg-primary); }
        .severity-badge.low { background: var(--severity-low); color: var(--bg-primary); }
        .code-diff {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin: 0.5rem 0;
        }
        .diff-header {
            background: var(--bg-secondary);
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }
        .diff-add { background: rgba(129, 199, 132, 0.2); }
        .diff-remove { background: rgba(239, 83, 80, 0.2); }
        .diff-add .line-num { background: rgba(129, 199, 132, 0.3); }
        .diff-remove .line-num { background: rgba(239, 83, 80, 0.3); }
        .diff-line {
            display: flex;
            font-family: 'Fira Code', 'Monaco', monospace;
            font-size: 0.85rem;
        }
        .line-num {
            min-width: 40px;
            padding: 0.25rem 0.5rem;
            text-align: right;
            color: var(--text-secondary);
            background: var(--bg-primary);
            user-select: none;
        }
        .line-content { padding: 0.25rem 0.5rem; white-space: pre-wrap; word-break: break-all; }
        footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{title}}</h1>
            <div class="meta">
                <span class="tag">审查报告</span>
                <span class="tag" style="background: var(--bg-secondary); color: var(--text-primary);">Diff 渲染 + 颜色编码</span>
            </div>
        </header>
        <main>
            {{content}}
        </main>
        <footer>
            CHK Document | Generated by Claude Code
        </footer>
    </div>
</body>
</html>
