<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>架构设计 - {{title}}</title>
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a2332;
            --bg-card: #1e2a3a;
            --border: #2d3f5a;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --accent: #4fc3f7;
            --accent-success: #81c784;
            --accent-warning: #ffb74d;
            --accent-danger: #ef5350;
            --code-bg: #1a1f29;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            padding: 2rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }
        header h1 { color: var(--accent); font-size: 1.8rem; }
        .meta { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .tag {
            background: var(--accent);
            color: var(--bg-primary);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        main { background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        .diagram-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            margin: 1.5rem 0;
            text-align: center;
        }
        .diagram-container svg { max-width: 100%; height: auto; }
        .component-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }
        .component-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            border-left: 4px solid var(--accent);
        }
        .component-card h3 { color: var(--accent); margin-bottom: 0.5rem; }
        .component-card .tech {
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: var(--bg-primary);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            display: inline-block;
            margin-top: 0.5rem;
        }
        .flow-diagram {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 1.5rem 0;
        }
        .flow-step {
            background: var(--bg-secondary);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--accent);
        }
        .flow-arrow { color: var(--text-secondary); font-size: 1.5rem; }
        .tech-stack {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 0.5rem 0;
        }
        .tech-item {
            background: linear-gradient(135deg, var(--accent), #2196f3);
            color: var(--bg-primary);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .flow-diagram { flex-direction: column; }
            .flow-arrow { transform: rotate(90deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{title}}</h1>
            <div class="meta">
                <span class="tag">架构设计</span>
                <span class="tag" style="background: var(--bg-secondary); color: var(--text-primary);">SVG 架构图</span>
            </div>
        </header>
        <main>
            {{content}}
        </main>
        <footer>
            CHK Document | Generated by Claude Code
        </footer>
    </div>
</body>
</html>
