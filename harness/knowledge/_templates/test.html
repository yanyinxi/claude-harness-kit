<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试报告 - {{title}}</title>
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a2332;
            --bg-card: #1e2a3a;
            --border: #2d3f5a;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --accent: #4fc3f7;
            --accent-success: #81c784;
            --accent-warning: #ffb74d;
            --accent-danger: #ef5350;
            --code-bg: #1a1f29;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            padding: 2rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }
        header h1 { color: var(--accent); font-size: 1.8rem; }
        .meta { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .tag {
            background: var(--accent);
            color: var(--bg-primary);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        main { background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .stat-card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-card .label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
        .stat-card.success .value { color: var(--accent-success); }
        .stat-card.warning .value { color: var(--accent-warning); }
        .stat-card.danger .value { color: var(--accent-danger); }
        .chart-container {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1rem 0;
        }
        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
            height: 150px;
            padding: 1rem 0;
        }
        .bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bar {
            width: 100%;
            max-width: 60px;
            background: var(--accent);
            border-radius: 4px 4px 0 0;
            transition: height 0.3s ease;
        }
        .bar-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            text-align: center;
        }
        .test-case {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            border-left: 4px solid var(--accent-success);
        }
        .test-case.failed { border-left-color: var(--accent-danger); }
        .test-case.skipped { border-left-color: var(--text-secondary); }
        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .test-name { font-weight: 600; }
        .test-status {
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .test-status.passed { background: var(--accent-success); color: var(--bg-primary); }
        .test-status.failed { background: var(--accent-danger); color: white; }
        .test-status.skipped { background: var(--text-secondary); color: var(--bg-primary); }
        .duration { color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.5rem; }
        footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{title}}</h1>
            <div class="meta">
                <span class="tag">测试报告</span>
                <span class="tag" style="background: var(--bg-secondary); color: var(--text-primary);">图表统计</span>
            </div>
        </header>
        <main>
            {{content}}
        </main>
        <footer>
            CHK Document | Generated by Claude Code
        </footer>
    </div>
</body>
</html>
