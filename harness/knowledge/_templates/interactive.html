<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式调整 - {{title}}</title>
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a2332;
            --bg-card: #1e2a3a;
            --border: #2d3f5a;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --accent: #4fc3f7;
            --accent-success: #81c784;
            --accent-warning: #ffb74d;
            --accent-danger: #ef5350;
            --code-bg: #1a1f29;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            padding: 2rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { color: var(--accent); font-size: 1.8rem; }
        .header-actions { display: flex; gap: 0.75rem; }
        .tag {
            background: var(--accent);
            color: var(--bg-primary);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        main { background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        .controls-panel {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 1.5rem;
        }
        .controls-sidebar {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1.5rem;
        }
        .control-group {
            margin-bottom: 1.5rem;
        }
        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .control-title { font-weight: 500; }
        .control-value {
            background: var(--bg-primary);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--accent);
        }
        .range-slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: var(--bg-primary);
            outline: none;
            -webkit-appearance: none;
        }
        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid var(--bg-card);
        }
        .range-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid var(--bg-card);
        }
        .preview-area {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 2rem;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }
        .btn-primary:hover { background: #3db8e8; transform: translateY(-1px); }
        .btn-success {
            background: var(--accent-success);
            color: var(--bg-primary);
        }
        .btn-success:hover { background: #6eb86e; }
        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover { background: #3db8e8; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(79, 195, 247, 0.3); }
        .copy-btn.copied {
            background: var(--accent-success);
        }
        .param-display {
            background: var(--code-bg);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent-success);
            color: var(--bg-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .grid-comparison {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }
        .option-card {
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .option-card.selected {
            border-color: var(--accent);
            background: rgba(79, 195, 247, 0.1);
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .controls-panel { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{title}}</h1>
            <div class="header-actions">
                <span class="tag">交互式调整</span>
                <span class="tag" style="background: var(--bg-secondary); color: var(--text-primary);">滑块/旋钮/选择器</span>
            </div>
        </header>
        <main>
            <div class="controls-panel">
                <div class="controls-sidebar">
                    {{controls}}
                </div>
                <div class="preview-area">
                    {{preview}}
                </div>
            </div>
            <div class="param-display">
                <strong>当前参数:</strong> <span id="params-output">{{params}}</span>
            </div>
            <div style="margin-top: 1rem; text-align: center;">
                <button class="copy-btn" onclick="copyParams()">
                    <span class="icon">📋</span> 复制参数
                </button>
            </div>
        </main>
        <footer>
            CHK Document | Generated by Claude Code
        </footer>
    </div>
    <div class="toast" id="toast">已复制到剪贴板</div>
    <script>
        function copyParams() {
            const params = document.getElementById('params-output').textContent;
            navigator.clipboard.writeText(params).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.classList.add('copied');
                btn.querySelector('.icon').textContent = '✓';
                showToast();
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.querySelector('.icon').textContent = '📋';
                }, 2000);
            });
        }
        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
